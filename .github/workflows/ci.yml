---
name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '.gitignore'
      - 'LICENSE'
      - 'NOTICE'
      - '**/docs/**'
      - README.md
      - CONTRIBUTING.md
      - MAINTAINERS.md
      - LICENSE
      - NOTICE
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '.gitignore'
      - 'LICENSE'
      - 'NOTICE'
      - '**/docs/**'
  workflow_dispatch:

permissions:
  pull-requests: read
  contents: write
  packages: write

jobs:
  ci:
    # yamllint disable-line
    uses: xmidt-org/shared-go/.github/workflows/ci.yml@2da2de92cd05c42efc4e8b72194b012a2559128b # v4.11.0
    with:
      release-type:         program
      release-arch-arm64:   true
      release-arch-amd64:   true
      release-main-package: ./cmd/certorder
      yaml-lint-skip:       false
    secrets: inherit
