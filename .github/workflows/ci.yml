---
name: CI

permissions:
  pull-requests: read
  contents: write
  packages: write

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '.gitignore'
      - 'LICENSE'
      - 'NOTICE'
      - '**/docs/**'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '.gitignore'
      - 'LICENSE'
      - 'NOTICE'
      - '**/docs/**'
  workflow_dispatch:

jobs:
  ci:
    uses: xmidt-org/shared-go/.github/workflows/ci.yml@e8e27665ab2158bd4d27d5bc2250e99db7c66ae0   # v4.9.39
    with:
      release-type:         program
      release-arch-arm64:   true
      release-arch-amd64:   true
      release-main-package: ./cmd/certorder
      yaml-lint-skip:       false
    secrets: inherit
